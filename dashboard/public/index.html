<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>spine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="/styles.css" />
  <script src="https://unpkg.com/cytoscape@3.30.2/dist/cytoscape.min.js"></script>
  <script src="https://unpkg.com/layout-base/layout-base.js"></script>
  <script src="https://unpkg.com/cose-base/cose-base.js"></script>
  <script src="https://unpkg.com/cytoscape-fcose@2.2.0/cytoscape-fcose.js"></script>
</head>
<body>

  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">spine</span>
      <span class="brand-sub">project memory</span>
    </div>
    <div class="modes">
      <button class="mode active" data-mode="graph">Graph</button>
      <button class="mode" data-mode="docs">Docs</button>
    </div>
  </header>

  <section id="graph-view" class="view">
    <div id="cy"></div>
    <div class="search"><input id="q" type="search" placeholder="Search PRs, commits, files, decisions…" autocomplete="off" /></div>
    <div class="legend" id="legend"></div>
    <div class="hint" id="hint">scroll to zoom · drag to pan · search to jump · click a cluster to expand</div>
    <aside id="panel" class="panel" hidden></aside>
  </section>

  <section id="docs-view" class="view" hidden>
    <aside class="docs-rail"><nav id="nav"></nav></aside>
    <main id="main"></main>
    <aside id="toc" class="toc-rail"></aside>
  </section>

  <script src="/app.js"></script>
</body>
</html>
